openapi: 3.1.0
info:
  title: Routra API
  description: One API key. Every AI provider.
  contact:
    name: Routra
    url: https://routra.dev
  license:
    name: ''
  version: 0.1.0
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Health check
      operationId: healthz
      responses:
        '200':
          description: Service is healthy
  /public/models:
    get:
      tags:
      - public
      summary: Public model catalog with pricing (no auth)
      description: |-
        Returns every model in the catalog with per-provider pricing and the cheapest
        option highlighted. Used by the public `/models` discovery page on the website.
      operationId: public_model_catalog
      responses:
        '200':
          description: Model catalog with pricing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicCatalogResponse'
  /v1/audio/speech:
    post:
      tags:
      - proxy
      summary: Text-to-speech (proxied)
      operationId: speech
      requestBody:
        description: OpenAI-compatible TTS body
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Audio stream (binary)
        '400':
          description: Bad request
        '503':
          description: No providers available
      security:
      - ApiKeyAuth: []
  /v1/audio/transcriptions:
    post:
      tags:
      - proxy
      summary: Speech-to-text transcription (proxied)
      description: |-
        Note: STT requests use `multipart/form-data` - the proxy forwards the raw body
        bytes transparently, preserving the content-type header.
      operationId: transcriptions
      requestBody:
        description: OpenAI-compatible transcription body (multipart/form-data)
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Transcription result
        '400':
          description: Bad request
        '503':
          description: No providers available
      security:
      - ApiKeyAuth: []
  /v1/audit-log:
    get:
      tags:
      - audit
      summary: List audit log entries
      operationId: list_audit_log
      parameters:
      - name: limit
        in: query
        description: Maximum number of results (default 50, max 200).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      - name: offset
        in: query
        description: Pagination offset.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogEntry'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/batch:
    get:
      tags:
      - batch
      summary: List batch jobs for the workspace
      operationId: list_batch_jobs
      responses:
        '200':
          description: List of batch jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchJobResponse'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - batch
      summary: Create an async batch inference job
      description: Submit up to 50,000 requests. 50-60% cheaper than synchronous. Results available via presigned R2 URL.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBatchRequest'
        required: true
      responses:
        '202':
          description: Batch job accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchJobResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/batch/{id}/cancel:
    post:
      tags:
      - batch
      summary: Cancel a batch job
      description: Cancels a queued or processing batch job. Already completed or failed jobs cannot be cancelled.
      operationId: cancel
      parameters:
      - name: id
        in: path
        description: Batch job ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Job cancelled
        '404':
          description: Job not found
        '409':
          description: Job already in terminal state
      security:
      - ApiKeyAuth: []
  /v1/batch/{id}/results:
    get:
      tags:
      - batch
      summary: Get batch job results URL
      description: Returns a presigned R2 URL when the job is complete. Poll status first.
      operationId: results
      parameters:
      - name: id
        in: path
        description: Batch job ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Results URL or current status
        '404':
          description: Job not found
      security:
      - ApiKeyAuth: []
  /v1/batch/{id}/status:
    get:
      tags:
      - batch
      summary: Get batch job status
      operationId: status
      parameters:
      - name: id
        in: path
        description: Batch job ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Batch job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchJobResponse'
        '404':
          description: Job not found
      security:
      - ApiKeyAuth: []
  /v1/billing:
    get:
      tags:
      - billing
      summary: Get billing information for the authenticated workspace
      operationId: get_billing
      responses:
        '200':
          description: Billing info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingInfo'
        '404':
          description: Workspace not found
      security:
      - ApiKeyAuth: []
  /v1/billing/checkout:
    post:
      tags:
      - billing
      summary: Create a Dodo Payments checkout session for a plan upgrade
      operationId: create_checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
        required: true
      responses:
        '200':
          description: Checkout URL to redirect the user to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        '400':
          description: Invalid request
        '503':
          description: Payment adapter not configured
      security:
      - ApiKeyAuth: []
  /v1/billing/subscription:
    delete:
      tags:
      - billing
      summary: Cancel the active subscription
      operationId: cancel_subscription
      responses:
        '204':
          description: Subscription cancellation initiated
        '404':
          description: No active subscription
        '503':
          description: Payment adapter not configured
      security:
      - ApiKeyAuth: []
  /v1/billing/topup:
    post:
      tags:
      - billing
      summary: Create a one-time Dodo Payments checkout session to top up credit balance
      operationId: topup_credit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopupRequest'
        required: true
      responses:
        '200':
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        '400':
          description: Invalid amount or URL
        '503':
          description: Payment adapter not configured
      security:
      - ApiKeyAuth: []
  /v1/chat/completions:
    post:
      tags:
      - proxy
      summary: Chat completions (proxied)
      operationId: chat_completions
      requestBody:
        description: OpenAI-compatible chat completions body
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Provider response (streaming or full)
        '400':
          description: Bad request
        '503':
          description: No providers available
      security:
      - ApiKeyAuth: []
  /v1/embeddings:
    post:
      tags:
      - proxy
      summary: Embeddings (proxied)
      operationId: embeddings
      requestBody:
        description: OpenAI-compatible embeddings body
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Provider response
        '503':
          description: No providers available
      security:
      - ApiKeyAuth: []
  /v1/images/generations:
    post:
      tags:
      - proxy
      summary: Image generation (proxied)
      operationId: generations
      requestBody:
        description: OpenAI-compatible image generation body
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Provider response with generated image(s)
        '400':
          description: Bad request
        '503':
          description: No providers available
      security:
      - ApiKeyAuth: []
  /v1/keys:
    get:
      tags:
      - keys
      summary: List API keys
      description: Returns prefix and metadata only - never the full key.
      operationId: list_keys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeySummary'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - keys
      summary: Create an API key
      description: Returns the full key exactly once - store it immediately.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
        required: true
      responses:
        '200':
          description: Created key with full secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateKeyResponse'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/keys/{id}:
    delete:
      tags:
      - keys
      summary: Revoke an API key
      operationId: revoke
      parameters:
      - name: id
        in: path
        description: Key ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Key revoked
        '404':
          description: Key not found
      security:
      - ApiKeyAuth: []
  /v1/keys/{id}/rotate:
    post:
      tags:
      - keys
      summary: Rotate an API key
      description: Issues a new key. Old key remains active for 24 hours.
      operationId: rotate
      parameters:
      - name: id
        in: path
        description: Key ID to rotate
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: New key (shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateKeyResponse'
        '404':
          description: Key not found
      security:
      - ApiKeyAuth: []
  /v1/models:
    get:
      tags:
      - proxy
      summary: List available models
      operationId: list_models
      responses:
        '200':
          description: List of available models (OpenAI-compatible format)
      security:
      - ApiKeyAuth: []
  /v1/models/catalog:
    get:
      tags:
      - providers
      summary: Full model catalog with per-provider pricing
      operationId: model_catalog
      responses:
        '200':
          description: Model catalog with pricing matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogResponse'
      security:
      - ApiKeyAuth: []
  /v1/notifications/inbox:
    get:
      tags:
      - notifications
      summary: List in-app notifications
      operationId: list_inbox
      parameters:
      - name: limit
        in: query
        description: Max items to return (default 50)
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Inbox items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxItemResponse'
      security:
      - ApiKeyAuth: []
  /v1/notifications/inbox/read-all:
    post:
      tags:
      - notifications
      summary: Mark all notifications as read
      operationId: mark_all_read
      responses:
        '200':
          description: All marked as read
      security:
      - ApiKeyAuth: []
  /v1/notifications/inbox/unread-count:
    get:
      tags:
      - notifications
      summary: Get unread notification count
      operationId: unread_count
      responses:
        '200':
          description: Unread count
      security:
      - ApiKeyAuth: []
  /v1/notifications/inbox/{id}/read:
    post:
      tags:
      - notifications
      summary: Mark a notification as read
      operationId: mark_read
      parameters:
      - name: id
        in: path
        description: Notification ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Marked as read
        '404':
          description: Not found
      security:
      - ApiKeyAuth: []
  /v1/notifications/preferences:
    get:
      tags:
      - notifications
      summary: List notification preferences
      operationId: list_preferences
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationPreferenceResponse'
      security:
      - ApiKeyAuth: []
    put:
      tags:
      - notifications
      summary: Update notification preference for an event type
      operationId: update_preference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferenceRequest'
        required: true
      responses:
        '200':
          description: Preference updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferenceResponse'
        '400':
          description: Invalid request
      security:
      - ApiKeyAuth: []
  /v1/policies:
    get:
      tags:
      - policies
      summary: List routing policies
      operationId: list_policies
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyResponse'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - policies
      summary: Create or update a routing policy
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
        required: true
      responses:
        '200':
          description: Policy created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/provider-keys:
    get:
      tags:
      - byok
      summary: List stored provider keys (BYOK)
      operationId: list_keys
      responses:
        '200':
          description: List of stored provider key summaries
      security:
      - ApiKeyAuth: []
      - ClerkJwt: []
    post:
      tags:
      - byok
      summary: Store a provider API key (BYOK)
      operationId: store_key
      requestBody:
        description: Provider slug and API key
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreKeyRequest'
        required: true
      responses:
        '200':
          description: Key stored successfully
        '400':
          description: Invalid provider slug or empty key
        '503':
          description: BYOK not configured
      security:
      - ApiKeyAuth: []
      - ClerkJwt: []
  /v1/provider-keys/{provider_slug}:
    delete:
      tags:
      - byok
      summary: Remove a stored provider key (BYOK)
      operationId: delete_key
      parameters:
      - name: provider_slug
        in: path
        description: Provider slug to remove key for
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Key removed
        '404':
          description: No key found for this provider
      security:
      - ApiKeyAuth: []
      - ClerkJwt: []
  /v1/provider-keys/{provider_slug}/verify:
    post:
      tags:
      - byok
      summary: Verify a stored provider key works (BYOK)
      operationId: verify_key
      parameters:
      - name: provider_slug
        in: path
        description: Provider slug to verify
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Verification result
        '404':
          description: No key found for this provider
        '503':
          description: BYOK not configured
      security:
      - ApiKeyAuth: []
      - ClerkJwt: []
  /v1/providers:
    get:
      tags:
      - providers
      summary: List providers with health and metrics
      operationId: list_providers
      responses:
        '200':
          description: Provider list with health info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersResponse'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/requests:
    get:
      tags:
      - usage
      summary: List recent routing events (request log)
      operationId: list_requests
      parameters:
      - name: limit
        in: query
        description: Maximum number of results (default 50, max 200).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      - name: offset
        in: query
        description: Pagination offset.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      responses:
        '200':
          description: Request log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestLogEntry'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/usage:
    get:
      tags:
      - usage
      summary: Get usage and cost summary for the current billing period
      operationId: get
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/usage/cost-breakdown:
    get:
      tags:
      - usage
      summary: Cost breakdown by model and provider for the current billing period
      operationId: cost_breakdown
      responses:
        '200':
          description: Cost breakdown items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CostBreakdownItem'
        '500':
          description: Internal error
      security:
      - ApiKeyAuth: []
  /v1/webhooks:
    get:
      tags:
      - webhooks
      summary: List webhook endpoints
      operationId: list_endpoints
      responses:
        '200':
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookEndpointResponse'
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - webhooks
      summary: Create webhook endpoint
      operationId: create_endpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
        required: true
      responses:
        '201':
          description: Webhook endpoint created (includes secret shown once)
        '400':
          description: Invalid URL or event type
      security:
      - ApiKeyAuth: []
  /v1/webhooks/{id}:
    delete:
      tags:
      - webhooks
      summary: Delete webhook endpoint
      operationId: delete_endpoint
      parameters:
      - name: id
        in: path
        description: Webhook endpoint ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
      security:
      - ApiKeyAuth: []
components:
  schemas:
    AuditLogEntry:
      type: object
      required:
      - id
      - action
      - resource_type
      - created_at
      properties:
        action:
          type: string
        actor_id:
          type:
          - string
          - 'null'
        created_at:
          type: string
        id:
          type: string
        metadata: {}
        resource_id:
          type:
          - string
          - 'null'
        resource_type:
          type: string
    BatchJobResponse:
      type: object
      required:
      - id
      - status
      - request_count
      - completed_count
      - created_at
      properties:
        completed_at:
          type:
          - string
          - 'null'
        completed_count:
          type: integer
          format: int32
        cost_usd:
          type:
          - number
          - 'null'
          format: double
        created_at:
          type: string
        deadline_at:
          type:
          - string
          - 'null'
        error_message:
          type:
          - string
          - 'null'
        id:
          type: string
          format: uuid
        policy_name:
          type:
          - string
          - 'null'
        request_count:
          type: integer
          format: int32
        status:
          type: string
          description: 'Job status: queued, processing, complete, failed, or cancelled.'
    BatchRequestItem:
      type: object
      description: A batch request item - mirrors OpenAI's batch API format.
      required:
      - custom_id
      - method
      - url
      - body
      properties:
        body: {}
        custom_id:
          type: string
        method:
          type: string
        url:
          type: string
    BillingInfo:
      type: object
      required:
      - billing_tier
      - subscription_status
      - spend_month_usd
      - credit_balance_usd
      - free_credit_granted
      properties:
        billing_tier:
          type: string
        credit_balance_usd:
          type: number
          format: double
          description: Current prepaid credit balance (USD). Relevant for Starter/free workspaces.
        free_credit_granted:
          type: boolean
          description: Whether the one-time $2 free credit has been issued to this workspace.
        spend_month_usd:
          type: number
          format: double
        subscription_id:
          type:
          - string
          - 'null'
          description: Active subscription ID (provider-agnostic external ID).
        subscription_status:
          type: string
    CatalogModelEntry:
      type: object
      required:
      - id
      - owned_by
      - tier
      - model_type
      - capabilities
      - providers
      properties:
        capabilities: {}
        id:
          type: string
        model_type:
          type: string
        owned_by:
          type: string
        param_count_b:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        providers:
          type: array
          items:
            $ref: '#/components/schemas/CatalogModelProvider'
        tier:
          type: string
    CatalogModelProvider:
      type: object
      required:
      - slug
      - pricing_unit
      - is_active
      - health
      properties:
        health:
          $ref: '#/components/schemas/HealthStatus'
        input_per_1m:
          type:
          - number
          - 'null'
          format: double
        is_active:
          type: boolean
        output_per_1m:
          type:
          - number
          - 'null'
          format: double
        pricing_unit:
          type: string
        slug:
          type: string
        unit_price:
          type:
          - number
          - 'null'
          format: double
    CircuitState:
      type: string
      enum:
      - closed
      - half_open
      - open
    CostBreakdownItem:
      type: object
      required:
      - model
      - provider
      - total_cost_usd
      - request_count
      properties:
        model:
          type: string
        provider:
          type: string
        request_count:
          type: integer
          format: int64
        total_cost_usd:
          type: number
          format: double
    CreateBatchRequest:
      type: object
      required:
      - requests
      properties:
        completion_window:
          type: string
          example: 24h
        policy_name:
          type:
          - string
          - 'null'
          description: Optional policy name to use for routing (references a saved policy).
        requests:
          type: array
          items:
            $ref: '#/components/schemas/BatchRequestItem'
          description: Array of request items (max 50,000).
    CreateCheckoutRequest:
      type: object
      required:
      - plan
      - customer_email
      - success_url
      properties:
        customer_email:
          type: string
        customer_name:
          type:
          - string
          - 'null'
          description: |-
            Customer display name forwarded to Dodo Payments. Optional - falls back
            to the username prefix of `customer_email` when absent.
        plan:
          type: string
          description: |-
            Target plan: `"pro"` or `"scale"`. The backend resolves the correct
            payment provider product ID from server-side configuration.
        success_url:
          type: string
    CreateCheckoutResponse:
      type: object
      required:
      - checkout_url
      properties:
        checkout_url:
          type: string
    CreateKeyRequest:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
          description: Human-readable label for this key.
        policy_name:
          type:
          - string
          - 'null'
          description: Attach a routing policy by name.
    CreateKeyResponse:
      type: object
      required:
      - id
      - prefix
      - key
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Full key - shown exactly once, never stored in plain text.
        name:
          type:
          - string
          - 'null'
        prefix:
          type: string
    CreatePolicyRequest:
      type: object
      required:
      - name
      properties:
        constraints:
          description: Constraint map (allowed_providers, allowed_regions, etc.).
        name:
          type: string
          description: Unique policy name within the workspace.
        strategy:
          type: string
          description: 'Routing strategy: cheapest, balanced, or fastest.'
          example: cheapest
    CreateWebhookRequest:
      type: object
      required:
      - url
      - events
      properties:
        events:
          type: array
          items:
            type: string
          description: |-
            Event types to subscribe to. Valid values:
              "key.expiring", "batch.completed", "spend.cap_approaching"
        url:
          type: string
          description: HTTPS URL to deliver webhook events to.
    HealthStatus:
      type: string
      enum:
      - healthy
      - degraded
      - down
      - unknown
    InboxItemResponse:
      type: object
      required:
      - id
      - event_type
      - title
      - body
      - is_read
      - created_at
      properties:
        body:
          type: string
        created_at:
          type: string
        event_type:
          type: string
        id:
          type: string
          format: uuid
        is_read:
          type: boolean
        title:
          type: string
    KeySummary:
      type: object
      required:
      - id
      - prefix
      - is_active
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
          format: uuid
        is_active:
          type: boolean
        last_used_at:
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        policy_id:
          type:
          - string
          - 'null'
          format: uuid
        prefix:
          type: string
    ModalityUsage:
      type: object
      required:
      - usage_unit
      - request_count
      - total_cost_usd
      - total_usage_value
      properties:
        request_count:
          type: integer
          format: int64
        total_cost_usd:
          type: number
          format: double
        total_usage_value:
          type: number
          format: double
          description: |-
            Total usage value in the unit (e.g. number of images, seconds of audio).
            For token-based models this is the sum of input + output tokens.
        usage_unit:
          type: string
          description: 'Usage unit: "tokens", "images", "characters", "seconds", "steps".'
    ModelCatalogResponse:
      type: object
      required:
      - version
      - models
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/CatalogModelEntry'
        version:
          type: string
    NotificationPreferenceResponse:
      type: object
      required:
      - event_type
      - email_enabled
      - in_app_enabled
      properties:
        email_enabled:
          type: boolean
        event_type:
          type: string
        in_app_enabled:
          type: boolean
    PolicyResponse:
      type: object
      required:
      - id
      - name
      - strategy
      - constraints
      - version
      - created_at
      - updated_at
      properties:
        constraints: {}
        created_at:
          type: string
        id:
          type: string
          format: uuid
        name:
          type: string
        strategy:
          type: string
        updated_at:
          type: string
        version:
          type: integer
          format: int32
    ProviderInfo:
      type: object
      required:
      - slug
      - display_name
      - tier
      - is_active
      - health
      - circuit_state
      - models_served
      - has_api_key
      properties:
        circuit_state:
          $ref: '#/components/schemas/CircuitState'
        display_name:
          type: string
        has_api_key:
          type: boolean
          description: Whether the server has an API key configured for this provider.
        health:
          $ref: '#/components/schemas/HealthStatus'
        is_active:
          type: boolean
        last_checked_at:
          type:
          - string
          - 'null'
        latency_p50_ms:
          type:
          - integer
          - 'null'
          format: int32
        models_served:
          type: integer
          format: int64
        queue_depth:
          type:
          - integer
          - 'null'
          format: int32
        slug:
          type: string
        tier:
          type: string
        uptime_pct_90d:
          type:
          - number
          - 'null'
          format: double
    ProvidersResponse:
      type: object
      required:
      - providers
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderInfo'
    PublicCatalogResponse:
      type: object
      required:
      - version
      - updated
      - models
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/PublicModelEntry'
        updated:
          type: string
        version:
          type: string
    PublicModelEntry:
      type: object
      required:
      - id
      - owned_by
      - tier
      - model_type
      - capabilities
      - providers
      properties:
        capabilities: {}
        cheapest_input_per_1m:
          type:
          - number
          - 'null'
          format: double
          description: Cheapest input price across all active providers (per 1M tokens).
        cheapest_output_per_1m:
          type:
          - number
          - 'null'
          format: double
          description: Cheapest output price across all active providers (per 1M tokens).
        cheapest_provider:
          type:
          - string
          - 'null'
          description: Slug of the cheapest provider for this model.
        id:
          type: string
        model_type:
          type: string
        owned_by:
          type: string
        param_count_b:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        providers:
          type: array
          items:
            $ref: '#/components/schemas/PublicModelProvider'
        tier:
          type: string
    PublicModelProvider:
      type: object
      required:
      - slug
      - display_name
      - pricing_unit
      properties:
        display_name:
          type: string
        input_per_1m:
          type:
          - number
          - 'null'
          format: double
        output_per_1m:
          type:
          - number
          - 'null'
          format: double
        pricing_unit:
          type: string
        slug:
          type: string
        unit_price:
          type:
          - number
          - 'null'
          format: double
    RequestLogEntry:
      type: object
      required:
      - id
      - model
      - provider
      - strategy
      - cost_usd
      - created_at
      properties:
        cost_usd:
          type: number
          format: double
        created_at:
          type: string
        error_code:
          type:
          - string
          - 'null'
        id:
          type: string
        input_tokens:
          type:
          - integer
          - 'null'
          format: int32
        latency_ms:
          type:
          - integer
          - 'null'
          format: int32
        model:
          type: string
        output_tokens:
          type:
          - integer
          - 'null'
          format: int32
        provider:
          type: string
        status_code:
          type:
          - integer
          - 'null'
          format: int32
        strategy:
          type: string
        usage_unit:
          type:
          - string
          - 'null'
          description: 'Usage unit: "tokens", "images", "characters", "seconds", "steps".'
        usage_value:
          type:
          - number
          - 'null'
          format: double
          description: Usage value in the specified unit.
    StoreKeyRequest:
      type: object
      required:
      - provider_slug
      - api_key
      properties:
        api_key:
          type: string
          description: The provider API key in plaintext. Encrypted before storage.
        provider_slug:
          type: string
          description: Provider slug (e.g. "openai", "anthropic", "groq")
    TopupRequest:
      type: object
      required:
      - amount_usd
      - customer_email
      - success_url
      properties:
        amount_usd:
          type: number
          format: double
          description: Amount in USD to add (between $5 and $500).
        customer_email:
          type: string
        customer_name:
          type:
          - string
          - 'null'
          description: |-
            Customer display name forwarded to Dodo Payments. Optional - falls back
            to the username prefix of `customer_email` when absent.
        success_url:
          type: string
    UpdatePreferenceRequest:
      type: object
      required:
      - event_type
      - email_enabled
      - in_app_enabled
      properties:
        email_enabled:
          type: boolean
        event_type:
          type: string
        in_app_enabled:
          type: boolean
    UsageSummary:
      type: object
      required:
      - total_requests
      - total_input_tokens
      - total_output_tokens
      - total_cost_usd
      - period
      - modality_breakdown
      properties:
        modality_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/ModalityUsage'
          description: Per-modality breakdown of usage for the current period.
        period:
          type: string
          description: Current billing period, e.g. "2026-04".
        total_cost_usd:
          type: number
          format: double
        total_input_tokens:
          type: integer
          format: int64
        total_output_tokens:
          type: integer
          format: int64
        total_requests:
          type: integer
          format: int64
    WebhookEndpointResponse:
      type: object
      required:
      - id
      - url
      - events
      - is_active
      - created_at
      properties:
        created_at:
          type: string
        events:
          type: array
          items:
            type: string
        id:
          type: string
        is_active:
          type: boolean
        url:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Routra-Key
