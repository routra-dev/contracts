<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="200" height="200">
  <defs><linearGradient id="lmg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00D4E8"/><stop offset="100%" stop-color="#F5A020"/></linearGradient></defs>
  <rect width="48" height="48" rx="38" fill="#020408"/>
  <!-- 3 provider input nodes -->
